# Example docker-compose for ghcr.io/lidslabs/jellyfin-hdr
#
# Copy to docker-compose.yml and adjust paths, timezone, and the env vars.
# See the README "Configuration" section for what each LIDSLABS_* variable does.
#
# Prerequisites:
#   - NVIDIA GPU + driver on the host
#   - NVIDIA Container Toolkit installed and configured for Docker
#   - In Jellyfin: Dashboard -> Playback -> Transcoding -> Hardware acceleration = NVENC,
#     with HEVC encoding enabled

services:
  jellyfin:
    image: ghcr.io/lidslabs/jellyfin-hdr:v0.3.3-jellyfin-10.11.11  # pin a version; avoid :latest in prod
    container_name: jellyfin
    restart: unless-stopped
    # GPU via the NVIDIA Container Toolkit (Compose device reservation —
    # the current method; no `runtime: nvidia` needed).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]     # pin a specific GPU; or use `count: all`
              capabilities: [gpu]
    environment:
      # --- lidslabs custom (see README "Configuration") ---
      # Master toggle. REQUIRED — without this, the image behaves like stock
      # Jellyfin (tonemap-to-SDR) and the forced-HEVC override never fires.
      LIDSLABS_ALLOW_HDR_TRANSCODE: "1"
      # Optional. Comma-separated friendly client names forced onto an HEVC
      # transcode. Recognized: neptune, streamyfin, neptune_av, swiftfin.
      LIDSLABS_FORCE_HEVC_CLIENTS: "neptune,streamyfin,neptune_av"
      # Optional. Apple AVPlayer clients that get an SDR companion rung on the
      # HDR master so they start HDR playback. Defaults to swiftfin,neptune_av —
      # omit unless you need to add/remove a client.
      # LIDSLABS_SDR_LADDER_CLIENTS: "swiftfin,neptune_av"
      # NVENC capabilities the toolkit exposes to the container.
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
      TZ: America/New_York
    ports:
      - "8096:8096"
    volumes:
      - ./config:/config
      - ./cache:/cache
      # rw (default) so Jellyfin can write posters / NFO / trickplay alongside media.
      - /path/to/media:/media
