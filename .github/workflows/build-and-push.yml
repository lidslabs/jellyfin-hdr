name: Build and push image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned versions from repo
        id: pins
        run: |
          {
            echo "upstream_version=$(cat UPSTREAM_VERSION)"
            echo "jellyfin_ref=$(cat JELLYFIN_REF)"
            echo "lidslabs_version=$(cat VERSION)"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lidslabs/jellyfin-hdr
          # The git tag (e.g. v0.1.0+jellyfin-10.11.10) is sanitized by
          # metadata-action - '+' becomes '_' for Docker tag compatibility.
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          flavor: |
            latest=false

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UPSTREAM_VERSION=${{ steps.pins.outputs.upstream_version }}
            JELLYFIN_REF=${{ steps.pins.outputs.jellyfin_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
