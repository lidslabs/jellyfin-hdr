name: Build and push image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned versions from repo
        id: pins
        run: |
          {
            echo "upstream_version=$(cat UPSTREAM_VERSION)"
            echo "jellyfin_ref=$(cat JELLYFIN_REF)"
            echo "lidslabs_version=$(cat VERSION)"
          } >> "$GITHUB_OUTPUT"

      - name: Detect pre-release
        if: github.ref_type == 'tag'
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -(rc|alpha|beta|dev)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lidslabs/jellyfin-hdr
          # The git tag (e.g. v0.1.0+jellyfin-10.11.10) is sanitized by
          # metadata-action - '+' becomes '_' for Docker tag compatibility.
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && steps.prerelease.outputs.is_prerelease == 'false' }}
          labels: |
            org.opencontainers.image.licenses=GPL-2.0-only
          flavor: |
            latest=false

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UPSTREAM_VERSION=${{ steps.pins.outputs.upstream_version }}
            JELLYFIN_REF=${{ steps.pins.outputs.jellyfin_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build release notes
        if: github.ref_type == 'tag'
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          ver="${tag#v}"             # strip leading v: v0.3.0+jellyfin-X -> 0.3.0+jellyfin-X
          img_tag="${tag//+/-}"      # docker-sanitized image tag (matches release.sh)

          {
            echo "## Pull"
            echo
            echo "Docker image tag (the git tag's \`+\` is sanitized to \`-\`):"
            echo
            echo "    docker pull ghcr.io/${repo}:${img_tag}"
            echo
          } > RELEASE_NOTES.md

          # Consumer digest: the matching CHANGELOG entry's lead paragraph plus its
          # optional '### Highlights' block. Stops at the first non-Highlights '###'
          # subsection, so the granular Added/Changed/Fixed detail stays in
          # CHANGELOG.md and out of the release notes. Empty if the tag has no entry.
          digest="$(awk -v ver="[$ver]" '
            /^## \[/ { if (found) exit; if (index($0, ver)) found=1; next }
            found && /^###[[:space:]]+/ && $0 !~ /^###[[:space:]]+Highlights/ { exit }
            found { print }
          ' CHANGELOG.md)"

          if [[ -n "${digest//[[:space:]]/}" ]]; then
            printf '%s\n\n' "$digest" >> RELEASE_NOTES.md
          fi
          echo "— Full detail in [CHANGELOG.md](https://github.com/${repo}/blob/main/CHANGELOG.md) —" >> RELEASE_NOTES.md

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          body_path: RELEASE_NOTES.md
